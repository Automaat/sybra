version: "2"

linters:
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - exhaustive
    - funlen
    - gocritic
    - gosec
    - ineffassign
    - modernize
    - nilerr
    - nilnesserr
    - nilnil
    - nolintlint
    - staticcheck
    - unused

  settings:
    errcheck:
      check-type-assertions: true

    exhaustive:
      default-signifies-exhaustive: true

    funlen:
      lines: 100
      statements: 70

    gosec:
      excludes:
        - G301 # dir permissions 0755 — intentional for local app dirs
        - G302 # file permissions 0644 — intentional for user-readable data files
        - G304 # file inclusion via variable — intentional in this app
        - G306 # WriteFile permissions 0644 — intentional for user-readable files

    gocritic:
      enabled-checks:
        - badLock
        - badRegexp
        - badSorting
        - boolExprSimplify
        - builtinShadow
        - builtinShadowDecl
        - commentedOutCode
        - deferInLoop
        - emptyFallthrough
        - equalFold
        - hexLiteral
        - httpNoBody
        - importShadow
        - indexAlloc
        - initClause
        - nestingReduce
        - nilValReturn
        - octalLiteral
        - paramTypeCombine
        - preferFilepathJoin
        - preferFprint
        - preferStringWriter
        - preferWriteByte
        - ptrToRefParam
        - rangeExprCopy
        - rangeValCopy
        - redundantSprint
        - regexpPattern
        - regexpSimplify
        - returnAfterHttpError
        - sloppyReassign
        - sortSlice
        - sprintfQuotedString
        - sqlQuery
        - stringConcatSimplify
        - stringXbytes
        - timeExprSimplify
        - tooManyResultsChecker
        - truncateCmp
        - typeAssertChain
        - typeDefFirst
        - typeUnparen
        - unlabelStmt
        - unnamedResult
        - unnecessaryBlock
        - unnecessaryDefer
        - weakCond
        - yodaStyleExpr

    nolintlint:
      require-explanation: true
      require-specific: true

  exclusions:
    presets:
      - common-false-positives
    paths:
      - third_party$
      - builtin$
      - examples$
    rules:
      - linters:
          - errcheck
          - funlen
          - gosec
        path: _test\.go

formatters:
  enable:
    - gofmt
    - goimports
