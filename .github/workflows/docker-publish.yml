name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. v1.2.3). Leave empty to auto-bump minor."
        required: false
        type: string

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/sybra

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            LATEST=$(git tag --list 'v*.*.*' --sort=-v:refname | head -n1)
          else
            LATEST=$(git tag --list 'v*.*.*' --sort=-v:refname | head -n1)
            if [ -z "$LATEST" ]; then
              VERSION="v0.1.0"
            else
              MAJOR=$(echo "$LATEST" | cut -d. -f1)
              MINOR=$(echo "$LATEST" | cut -d. -f2)
              VERSION="${MAJOR}.$((MINOR + 1)).0"
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prev_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION (prev: $LATEST)"

      - name: Create and push tag
        run: |
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: image
        run: echo "name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate release notes
        shell: bash
        run: |
          PREV="${{ steps.version.outputs.prev_version }}"
          if [ -z "$PREV" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV}..HEAD"
          fi

          declare -A TITLES
          TITLES[feat]="### Features"
          TITLES[fix]="### Bug Fixes"
          TITLES[perf]="### Performance"
          TITLES[refactor]="### Refactoring"
          TITLES[docs]="### Documentation"
          TITLES[ci]="### CI"
          TITLES[test]="### Tests"
          TITLES[build]="### Build"
          TITLES[chore]="### Chores"

          declare -A LINES

          while IFS= read -r subject; do
            TYPE=$(echo "$subject" | grep -oP '^[a-z]+(?=[\(\:!])')
            if [ -n "$TYPE" ] && [ -n "${TITLES[$TYPE]+x}" ]; then
              LINES[$TYPE]+="- ${subject}"$'\n'
            else
              LINES[other]+="- ${subject}"$'\n'
            fi
          done < <(git log "$RANGE" --format="%s" 2>/dev/null)

          NOTES=""
          for TYPE in feat fix perf refactor docs ci test build chore; do
            if [ -n "${LINES[$TYPE]}" ]; then
              NOTES+="${TITLES[$TYPE]}"$'\n'
              NOTES+="${LINES[$TYPE]}"$'\n'
            fi
          done
          if [ -n "${LINES[other]}" ]; then
            NOTES+="### Other"$'\n'
            NOTES+="${LINES[other]}"$'\n'
          fi

          if [ -z "$NOTES" ]; then
            NOTES="No changes recorded."
          fi

          printf '%s' "$NOTES" > /tmp/release-notes.md
          cat /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release-notes.md
