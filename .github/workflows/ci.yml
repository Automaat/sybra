name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-go:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Build frontend (needed for go:embed)
        run: cd frontend && npm ci && npm run build:desktop

      - name: Run Go tests
        run: go test ./...

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Type-check
        run: cd frontend && npm run check

      - name: Build desktop variant
        run: cd frontend && npm run build:desktop

      - name: Build web variant
        run: cd frontend && npm run build:web

      - name: Run unit tests
        run: cd frontend && npx vitest run --passWithNoTests

  lint-go:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Build frontend (needed for go:embed)
        run: cd frontend && npm ci && npm run build:desktop

      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: latest

  lint-dockerfile:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml
          failure-threshold: warning

  check-wailsjs:
    name: Wails Bindings Sync
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Install wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build frontend (needed for go:embed)
        run: cd frontend && npm ci && npm run build:desktop

      - name: Regenerate bindings
        run: wails generate module

      - name: Check for drift
        run: |
          git diff --exit-code frontend/wailsjs/ || \
            (echo "::error::Wails bindings out of sync. Run 'wails generate module'." && exit 1)

  build:
    name: Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Install wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Lint frontend
        run: cd frontend && npm ci && npx oxlint .

      - name: Build
        run: wails build

  doc-version-sync:
    name: Doc Version Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: |
          GO_VERSION=$(grep '^go ' go.mod | awk '{print $2}')
          grep -q "$GO_VERSION" README.md || (echo "README Go version stale (want $GO_VERSION)" && exit 1)
          grep -q "$GO_VERSION" CLAUDE.md || (echo "CLAUDE.md Go version stale (want $GO_VERSION)" && exit 1)

  go-mod-integrity:
    name: Go Module Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Verify module checksums
        run: go mod verify

      - name: Check for go.mod/go.sum drift
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || \
            (echo "::error::go.mod or go.sum is out of sync. Run 'go mod tidy'." && exit 1)

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Run govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

      - name: Run npm audit
        run: cd frontend && npm ci && npm audit --audit-level moderate

  e2e:
    name: E2E Tests (${{ matrix.provider }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        provider: [claude, codex]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install chromium

      - name: Seed e2e fixtures
        run: |
          mkdir -p "$SYBRA_HOME/tasks"
          cp frontend/e2e/fixtures/*.md "$SYBRA_HOME/tasks/"
          cat > "$SYBRA_HOME/config.yaml" <<EOF
          agent:
            provider: ${{ matrix.provider }}
          EOF
        env:
          SYBRA_HOME: /tmp/sybra-e2e

      - name: Build web frontend
        run: cd frontend && npm run build:web

      - name: Build sybra-server
        run: go build -o bin/sybra-server ./cmd/sybra-server

      - name: Start sybra-server
        run: |
          SYBRA_HOME=/tmp/sybra-e2e \
          SYBRA_STATIC_DIR=frontend/dist-web \
          ./bin/sybra-server > /tmp/sybra-server.log 2>&1 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          echo "Waiting for sybra-server..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Ready after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::sybra-server timed out"
              cat /tmp/sybra-server.log
              exit 1
            fi
            sleep 1
          done

      - name: Run e2e tests
        run: cd frontend && npx playwright test --reporter=github
        env:
          SYBRA_HOME: /tmp/sybra-e2e
          SYBRA_E2E_PROVIDER: ${{ matrix.provider }}

      - name: Dump server log
        if: failure()
        run: cat /tmp/sybra-server.log || true

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: playwright-report-${{ matrix.provider }}
          path: frontend/test-results/
          retention-days: 7
