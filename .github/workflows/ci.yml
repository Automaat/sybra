name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-go:
    name: Go Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Install tmux
        run: brew install tmux

      - name: Build frontend (needed for go:embed)
        run: cd frontend && npm ci && npm run build

      - name: Run Go tests
        run: go test ./...

  test-frontend:
    name: Frontend Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Type-check
        run: cd frontend && npm run check

      - name: Run unit tests
        run: cd frontend && npx vitest run --passWithNoTests

  lint-go:
    name: Go Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Build frontend (needed for go:embed)
        run: cd frontend && npm ci && npm run build

      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: latest

  check-wailsjs:
    name: Wails Bindings Sync
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Install wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build frontend (needed for go:embed)
        run: cd frontend && npm ci && npm run build

      - name: Regenerate bindings
        run: wails generate module

      - name: Check for drift
        run: |
          git diff --exit-code frontend/wailsjs/ || \
            (echo "::error::Wails bindings out of sync. Run 'wails generate module'." && exit 1)

  build:
    name: Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Install wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Lint frontend
        run: cd frontend && npm ci && npx oxlint .

      - name: Build
        run: wails build

  security:
    name: Security Audit
    runs-on: macos-15
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Run govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

      - name: Run npm audit
        run: cd frontend && npm ci && npm audit --audit-level moderate

  e2e:
    name: E2E Tests (${{ matrix.provider }})
    runs-on: macos-15
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        provider: [claude, codex]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Install wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install chromium

      - name: Seed e2e fixtures
        run: |
          mkdir -p "$SYNAPSE_HOME/tasks"
          cp frontend/e2e/fixtures/*.md "$SYNAPSE_HOME/tasks/"
          cat > "$SYNAPSE_HOME/config.yaml" <<EOF
          agent:
            provider: ${{ matrix.provider }}
          EOF
        env:
          SYNAPSE_HOME: /tmp/synapse-e2e

      # Playwright's webServer config starts wails dev and waits for it to be
      # ready (reuseExistingServer: false in CI).  No manual start needed.
      - name: Run e2e tests
        run: cd frontend && npx playwright test --reporter=github
        env:
          SYNAPSE_HOME: /tmp/synapse-e2e
          SYNAPSE_E2E_PROVIDER: ${{ matrix.provider }}

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: failure()
        with:
          name: playwright-report-${{ matrix.provider }}
          path: frontend/test-results/
          retention-days: 7
