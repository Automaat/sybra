[tools]
go = "1.26.2"
node = "24"
"go:github.com/wailsapp/wails/v2/cmd/wails" = "v2.12.0"

[tasks.dev]
run = ["go install ./cmd/synapse-cli", "wails dev"]
description = "Install CLI and run wails dev server"
env = { SYNAPSE_PPROF = "127.0.0.1:6060" }

[tasks.build]
run = "wails build"
description = "Build production binary"

[tasks."build:cli"]
run = "go build -o build/bin/synapse-cli ./cmd/synapse-cli"
description = "Build CLI binary"

[tasks.lint]
run = ["golangci-lint run ./...", "cd frontend && npx oxlint ."]
description = "Run all linters"
