id: simple-task
name: Simple Task
description: Triage, plan or implement, evaluate, review
builtin: true
trigger:
  on: task.created
  conditions:
    - field: task.tags
      operator: not_contains
      value: review
steps:
  - id: triage
    name: Triage
    type: run_agent
    config:
      role: triage
      mode: headless
      model: sonnet
      max_retries: 3
      prompt: >-
        Triage task {{.Task.ID}} using /synapse-triage skill.
        Get the task with synapse-cli, analyze it, assign tags, mode, and update status.
        IMPORTANT: if the task title is a URL (e.g. a GitHub issue/PR link),
        you MUST fetch the real title from that URL using gh and update the task title
        to a human-readable summary. Never leave a raw URL as the task title.
      allowed_tools:
        - Bash
        - Read
        - Skill
    next:
      # Short-circuit when triage determined the task is already past
      # implementation (e.g. PR already open, escalated, or done). Without
      # these guards the workflow would clobber the status in set_in_progress
      # and dispatch a duplicate implement step.
      - when:
          field: task.status
          operator: equals
          value: in-review
        goto: ""
      - when:
          field: task.status
          operator: equals
          value: human-required
        goto: ""
      - when:
          field: task.status
          operator: equals
          value: done
        goto: ""
      - when:
          field: task.status
          operator: equals
          value: planning
        goto: plan
      - goto: set_in_progress

  - id: plan
    name: Plan
    type: run_agent
    config:
      role: plan
      mode: interactive
      model: opus
      needs_worktree: true
      reuse_agent: true
      # Interactive plan agents do not exit — they pause idle between turns.
      # The workflow advances to review_plan when the agent flips the task
      # status to "plan-review" via the CLI, which fires the engine status
      # hook (see engine.HandleStatusChange).
      wait_for_status: plan-review
      prompt: >-
        {{- $feedback := getvar .Vars "human.feedback" }}
        {{- if $feedback }}
        Plan rejected. Feedback:

        {{ $feedback }}

        Revise the plan for task {{.Task.ID}} to address these points.
        Update the plan and set status back to plan-review when done.
        {{- else }}
        Plan task {{.Task.ID}} using /synapse-plan skill.
        Get the task with synapse-cli, analyze the codebase,
        and produce a detailed implementation plan.

        When the plan is ready:
          1. synapse-cli update {{.Task.ID}} --plan "<full plan markdown>"
          2. synapse-cli update {{.Task.ID}} --status plan-review

        Then STOP and wait. Do NOT exit. Do NOT implement.

        If you receive feedback from the user, address it, update the plan again
        with the revised plan, set status back to plan-review, and wait again.
        {{- end }}
    next:
      - goto: maybe_critique

  # Branch around critique_plan when the task is tagged `nocritic`.
  # Substring match on the comma-joined tag list (see workflow/condition.go).
  - id: maybe_critique
    name: Critique Decision
    type: condition
    config:
      check:
        field: task.tags
        operator: not_contains
        value: nocritic
    next:
      - when:
          field: task.tags
          operator: not_contains
          value: nocritic
        goto: critique_plan
      - goto: review_plan

  - id: critique_plan
    name: Critique Plan
    type: run_agent
    config:
      role: plan-critic
      mode: headless
      model: sonnet
      needs_worktree: true
      max_retries: 2
      prompt: >-
        Critique the plan for task {{.Task.ID}} using the /plan-critic skill.

        Steps:
          1. Run: synapse-cli --json get {{.Task.ID}}
          2. Extract the .plan field from the JSON output and write it to
             /tmp/synapse-plan-{{.Task.ID}}.md
          3. Invoke: /plan-critic /tmp/synapse-plan-{{.Task.ID}}.md
          4. Capture the full markdown Plan Review report you produce and
             write it to /tmp/synapse-critique-{{.Task.ID}}.md
          5. Save it: synapse-cli update {{.Task.ID}} --plan-critique-file /tmp/synapse-critique-{{.Task.ID}}.md

        Do NOT modify the plan. Do NOT change the task status. Your only
        side effect is writing the critique sidecar via synapse-cli.
      allowed_tools:
        - Bash
        - Read
        - Grep
        - Glob
        - Write
        - Skill
        - Agent
    next:
      - goto: review_plan

  - id: review_plan
    name: Review Plan
    type: wait_human
    config:
      status: plan-review
      human_actions:
        - approve
        - reject
    next:
      - when:
          field: vars.human_action
          operator: equals
          value: approve
        goto: set_in_progress
      - when:
          field: vars.human_action
          operator: equals
          value: reject
        goto: start_replan

  # Reset status before re-entering `plan` so the plan-review status-change
  # hook fires again when the agent delivers a revised plan. Without this
  # reset the second iteration would already be at plan-review and no
  # transition event would be emitted to advance the workflow.
  - id: start_replan
    name: Prepare Replan
    type: set_status
    config:
      status: planning
    next:
      - goto: plan

  - id: set_in_progress
    name: Start Implementation
    type: set_status
    config:
      status: in-progress
    next:
      - goto: implement

  - id: implement
    name: Implement
    type: run_agent
    config:
      role: implementation
      mode: "{{.Task.AgentMode}}"
      model: sonnet
      prompt: >-
        Implement this task. When done, create a draft PR with `gh pr create --draft`.
        {{- if .Task.Plan}}

        ## Plan

        {{.Task.Plan}}
        {{- end}}
    next:
      - goto: verify_commits

  # Mechanical check (no LLM): verifies the task's branch has at least one
  # commit ahead of origin/main before running eval. Flips to human-required
  # with reason "no commits pushed to branch" when the branch is empty.
  # Skips gracefully when no worktree exists (e.g. task has no project).
  - id: verify_commits
    name: Verify Commits
    type: verify_commits
    next:
      - when:
          field: task.status
          operator: equals
          value: human-required
        goto: ""
      - goto: link_pr_and_review

  # Non-LLM step: recover PR number from task, agent result history, or
  # gh pr list. Sets task to in-review and skips the LLM eval when a PR
  # is unambiguously found. Falls through to evaluate only when all three
  # sources fail to find a PR.
  - id: link_pr_and_review
    name: Link PR and Review
    type: link_pr_and_review
    next:
      - when:
          field: task.status
          operator: equals
          value: in-review
        goto: ensure_pr_closes_issue
      - when:
          field: task.status
          operator: equals
          value: human-required
        goto: ""
      - goto: evaluate

  - id: evaluate
    name: Evaluate
    type: run_agent
    config:
      role: eval
      mode: headless
      model: sonnet
      prompt: >-
        Evaluate task {{.Task.ID}}. Do NOT read source code or review diffs.

        1. Run: synapse-cli --json get {{.Task.ID}}
        2. Find the PR number:
           a. Check task's pr_number field from step 1
           b. Check agent result below for PR URLs (github.com/.../pull/N)
           c. If neither found AND task has a branch, run: gh pr list --repo <project_id> --head <branch> --json number
           If PR found by any method, link: synapse-cli --json update {{.Task.ID}} --pr <number>
        3. Set status based on findings:
           - PR exists → in-review
           - Work done but no PR → human-required
           - Failed/errors/incomplete → human-required (MUST include --status-reason)
           - Never set done or todo
           Run: synapse-cli --json update {{.Task.ID}} --status <status> [--status-reason "reason"]

        ## Agent Result

        {{recoveredorprev .Workflow .Prev}}
      allowed_tools:
        - Bash
    next:
      - goto: ensure_pr_closes_issue

  # Mechanical check (no LLM): if the task is linked to a GitHub issue,
  # make sure the PR's body carries a `Closes <issue-url>` reference so
  # merging the PR auto-closes the issue. Auto-appends the reference if
  # missing; flips to human-required if the edit/verification fails.
  - id: ensure_pr_closes_issue
    name: Ensure PR Closes Issue
    type: ensure_pr_closes_issue
    next:
      - goto: ""
