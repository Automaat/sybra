id: simple-task
name: Simple Task
description: Triage, plan or implement, evaluate, review
builtin: true
trigger:
  on: task.created
  conditions:
    - field: task.tags
      operator: not_contains
      value: review
steps:
  - id: triage
    name: Triage
    type: run_agent
    config:
      role: triage
      mode: headless
      model: sonnet
      max_retries: 3
      prompt: >-
        Triage task {{.Task.ID}} using /synapse-triage skill.
        Get the task with synapse-cli, analyze it, assign tags, mode, and update status.
        IMPORTANT: if the task title is a URL (e.g. a GitHub issue/PR link),
        you MUST fetch the real title from that URL using gh and update the task title
        to a human-readable summary. Never leave a raw URL as the task title.
      allowed_tools:
        - Bash
        - Read
        - Skill
    next:
      - when:
          field: task.status
          operator: equals
          value: planning
        goto: plan
      - goto: set_in_progress

  - id: plan
    name: Plan
    type: run_agent
    config:
      role: plan
      mode: interactive
      model: opus
      needs_worktree: true
      reuse_agent: true
      prompt: >-
        {{- $feedback := getvar .Vars "human.feedback" }}
        {{- if $feedback }}
        Plan rejected. Feedback:

        {{ $feedback }}

        Revise the plan for task {{.Task.ID}} to address these points.
        Update the task body and set status back to plan-review when done.
        {{- else }}
        Plan task {{.Task.ID}} using /synapse-plan skill.
        Get the task with synapse-cli, analyze the codebase,
        and produce a detailed implementation plan.

        When the plan is ready:
          1. synapse-cli update {{.Task.ID}} --body "<full plan markdown>"
          2. synapse-cli update {{.Task.ID}} --status plan-review

        Then STOP and wait. Do NOT exit. Do NOT implement.

        If you receive feedback from the user, address it, update the body again
        with the revised plan, set status back to plan-review, and wait again.
        {{- end }}
    next:
      - goto: review_plan

  - id: review_plan
    name: Review Plan
    type: wait_human
    config:
      status: plan-review
      human_actions:
        - approve
        - reject
    next:
      - when:
          field: vars.human_action
          operator: equals
          value: approve
        goto: set_in_progress
      - when:
          field: vars.human_action
          operator: equals
          value: reject
        goto: plan

  - id: set_in_progress
    name: Start Implementation
    type: set_status
    config:
      status: in-progress
    next:
      - goto: implement

  - id: implement
    name: Implement
    type: run_agent
    config:
      role: implementation
      mode: "{{.Task.AgentMode}}"
      model: sonnet
      prompt: >-
        Implement this task. When done, create a draft PR with `gh pr create --draft`.
    next:
      - goto: evaluate

  - id: evaluate
    name: Evaluate
    type: run_agent
    config:
      role: eval
      mode: headless
      model: sonnet
      prompt: >-
        Evaluate task {{.Task.ID}}. Do NOT read source code or review diffs.

        1. Run: synapse-cli --json get {{.Task.ID}}
        2. Find the PR number:
           a. Check task's pr_number field from step 1
           b. Check agent result below for PR URLs (github.com/.../pull/N)
           c. If neither found AND task has a branch, run: gh pr list --repo <project_id> --head <branch> --json number
           If PR found by any method, link: synapse-cli --json update {{.Task.ID}} --pr <number>
        3. Set status based on findings:
           - PR exists → in-review
           - Work done but no PR → human-required
           - Failed/errors/incomplete → human-required (MUST include --status-reason)
           - Never set done or todo
           Run: synapse-cli --json update {{.Task.ID}} --status <status> [--status-reason "reason"]

        ## Agent Result

        {{.Prev.Output}}
      allowed_tools:
        - Bash
    next:
      - goto: ""
