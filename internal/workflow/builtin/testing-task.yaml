id: testing-task
name: Manual Testing
description: Plan and execute manual testing of a feature
builtin: true
trigger:
  on: task.status_changed
  conditions:
    - field: task.status
      operator: equals
      value: testing
steps:
  - id: plan_test
    name: Prepare Test Plan
    type: run_agent
    config:
      role: test-plan
      mode: interactive
      model: opus
      needs_worktree: true
      reuse_agent: true
      prompt: >-
        {{- $feedback := getvar .Vars "human.feedback" }}
        {{- if $feedback }}
        Test plan rejected. Feedback:

        {{ $feedback }}

        Revise the manual test plan for task {{.Task.ID}} to address these points
        using the /synapse-test-plan skill. Update --plan and set status back to
        test-plan-review when done.
        {{- else }}
        Prepare a manual test plan for task {{.Task.ID}} using the /synapse-test-plan skill.

        The skill spawns three expert-tester personas (Bach, Kaner, Hendrickson)
        in parallel, merges their outputs, runs a sanity-check review, and
        publishes via:
          1. synapse-cli update {{.Task.ID}} --plan "<merged plan>"
          2. synapse-cli update {{.Task.ID}} --plan-critique "<review + attribution>"
          3. synapse-cli update {{.Task.ID}} --status test-plan-review

        Then STOP and wait. Do NOT exit. Do NOT execute the tests yet.

        If you receive feedback, address it, update --plan again, set status
        back to test-plan-review, and wait again.
        {{- end }}
    next:
      - goto: review_test_plan

  - id: review_test_plan
    name: Review Test Plan
    type: wait_human
    config:
      status: test-plan-review
      human_actions:
        - approve
        - reject
    next:
      - when:
          field: vars.human_action
          operator: equals
          value: approve
        goto: execute_tests
      - when:
          field: vars.human_action
          operator: equals
          value: reject
        goto: plan_test

  - id: execute_tests
    name: Execute Manual Testing
    type: run_agent
    config:
      role: test-runner
      mode: interactive
      model: sonnet
      needs_worktree: true
      prompt: >-
        Execute the approved manual test plan for task {{.Task.ID}}.

        1. synapse-cli --json get {{.Task.ID}}  (the .plan field contains the approved test plan)
        2. Run each test case. Start the app/CLI as needed, interact with it,
           capture observed vs expected results.
        3. Append a "## Test Results" section to the task body documenting
           pass/fail for each case plus any reproduction notes.
        4. synapse-cli update {{.Task.ID}} --status human-required
           --status-reason "manual testing complete - verify results"
    next:
      - goto: ""
