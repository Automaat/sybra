id: testing-task
name: Manual Testing
description: Plan and execute manual testing of a feature
builtin: true
trigger:
  on: task.status_changed
  conditions:
    - field: task.status
      operator: equals
      value: testing
steps:
  - id: plan_test
    name: Prepare Test Plan
    type: run_agent
    config:
      role: test-plan
      mode: interactive
      model: opus
      needs_worktree: true
      reuse_agent: true
      wait_for_status: test-plan-review
      prompt: >-
        {{- $feedback := getvar .Vars "human.feedback" }}
        {{- if $feedback }}
        Test plan rejected. Feedback:

        {{ $feedback }}

        Revise the manual test plan for task {{.Task.ID}} to address these points
        using the /sybra-test-plan skill. Update --plan and set status back to
        test-plan-review when done.
        {{- else }}
        Prepare a manual test plan for task {{.Task.ID}} using the /sybra-test-plan skill.

        When the plan is ready:
          1. sybra-cli update {{.Task.ID}} --plan "<full plan markdown>"
          2. sybra-cli update {{.Task.ID}} --status test-plan-review

        Then STOP and wait. Do NOT exit. Do NOT execute the tests yet.

        If you receive feedback, address it, update --plan again, set status
        back to test-plan-review, and wait again.
        {{- end }}
    next:
      - goto: maybe_critique_test

  # Skip critique on replan iterations (after a human reject) — the plan has
  # already been critiqued once; re-critiquing each revision just burns tokens.
  # `vars.step.review_test_plan.output` only exists after wait_human produced
  # a verdict, which is the reliable marker for "this is a replan, not the
  # first pass".
  - id: maybe_critique_test
    name: Test Critique Decision
    type: condition
    config:
      check:
        field: task.tags
        operator: not_contains
        value: nocritic
    next:
      - when:
          field: vars.step.review_test_plan.output
          operator: exists
        goto: review_test_plan
      - when:
          field: task.tags
          operator: not_contains
          value: nocritic
        goto: critique_test_plan
      - goto: review_test_plan

  - id: critique_test_plan
    name: Critique Test Plan
    type: run_agent
    config:
      role: test-plan-critic
      mode: headless
      model: sonnet
      provider: cross
      needs_worktree: true
      max_retries: 2
      prompt: >-
        Critique the test plan for task {{.Task.ID}} using the /plan-critic skill.

        Steps:
          1. Run: sybra-cli --json get {{.Task.ID}}
          2. Extract the .plan field from the JSON output and write it to
             /tmp/sybra-plan-{{.Task.ID}}.md
          3. Invoke: /plan-critic /tmp/sybra-plan-{{.Task.ID}}.md
          4. Capture the full markdown Plan Review report you produce and
             write it to /tmp/sybra-critique-{{.Task.ID}}.md
          5. Save it: sybra-cli update {{.Task.ID}} --plan-critique-file /tmp/sybra-critique-{{.Task.ID}}.md

        Do NOT modify the plan. Do NOT change the task status. Your only
        side effect is writing the critique sidecar via sybra-cli.
      allowed_tools:
        - Bash
        - Read
        - Grep
        - Glob
        - Write
        - Skill
        - Agent
    next:
      - goto: review_test_plan

  - id: review_test_plan
    name: Review Test Plan
    type: wait_human
    config:
      status: test-plan-review
      human_actions:
        - approve
        - reject
    next:
      - when:
          field: vars.human_action
          operator: equals
          value: approve
        goto: execute_tests
      - when:
          field: vars.human_action
          operator: equals
          value: reject
        goto: start_replan_test

  - id: start_replan_test
    name: Prepare Replan
    type: set_status
    config:
      status: testing
    next:
      - goto: plan_test

  - id: execute_tests
    name: Execute Manual Testing
    type: run_agent
    config:
      role: test-runner
      mode: interactive
      model: sonnet
      needs_worktree: true
      prompt: >-
        Execute the approved manual test plan for task {{.Task.ID}}.

        1. sybra-cli --json get {{.Task.ID}}  (the .plan field contains the approved test plan)
        2. Run each test case. Start the app/CLI as needed, interact with it,
           capture observed vs expected results.
        3. Append a "## Test Results" section to the task body documenting
           pass/fail for each case plus any reproduction notes.
        4. sybra-cli update {{.Task.ID}} --status human-required
           --status-reason "manual testing complete - verify results"
    next:
      - goto: ""
