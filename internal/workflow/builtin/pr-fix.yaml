id: pr-fix
name: PR Fix
description: Fix CI failures or merge conflicts on a PR
builtin: true
trigger:
  on: pr.event
  conditions:
    - field: pr.issue_kind
      operator: in
      value: conflict,ci_failure
steps:
  - id: set_in_progress
    name: Mark In Progress
    type: set_status
    config:
      status: in-progress
    next:
      - goto: fix

  - id: fix
    name: Fix PR Issue
    type: run_agent
    config:
      role: pr-fix
      mode: headless
      model: sonnet
      prompt: >-
        {{ getvar .Vars "prompt" }}
    next:
      - goto: verify_commits

  # Mechanical check (no LLM): verifies the task's branch has at least one
  # commit ahead of origin/main before running eval. Flips to human-required
  # with reason "no commits pushed to branch" when the branch is empty.
  # Skips gracefully when no worktree exists (e.g. task has no project).
  - id: verify_commits
    name: Verify Commits
    type: verify_commits
    next:
      - when:
          field: task.status
          operator: equals
          value: human-required
        goto: ""
      - goto: evaluate

  - id: evaluate
    name: Evaluate Fix
    type: run_agent
    config:
      role: eval
      mode: headless
      model: sonnet
      prompt: >-
        Evaluate task {{.Task.ID}}. Do NOT read source code or review diffs.

        1. Run: synapse-cli --json get {{.Task.ID}}
        2. Find the PR number:
           a. Check task's pr_number field from step 1
           b. Check agent result below for PR URLs (github.com/.../pull/N)
           c. If neither found AND task has a branch, run: gh pr list --repo <project_id> --head <branch> --json number
           If PR found by any method, link: synapse-cli --json update {{.Task.ID}} --pr <number>
        3. Set status based on findings:
           - PR exists → in-review
           - Work done but no PR → human-required
           - Failed/errors/incomplete → human-required (MUST include --status-reason)
           Run: synapse-cli --json update {{.Task.ID}} --status <status> [--status-reason "reason"]

        ## Agent Result

        {{recoveredorprev .Workflow .Prev}}
      allowed_tools:
        - Bash
    next:
      - goto: ensure_pr_closes_issue

  # Mechanical check (no LLM): if the task is linked to a GitHub issue,
  # make sure the PR's body carries a `Closes <issue-url>` reference so
  # merging the PR auto-closes the issue.
  - id: ensure_pr_closes_issue
    name: Ensure PR Closes Issue
    type: ensure_pr_closes_issue
    next:
      - goto: ""
